<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard +Roma 2025/26</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --bg2: #1a1d27;
      --bg3: #22263a;
      --border: #2e3250;
      --text: #e8eaf6;
      --text2: #8b90b8;
      --blue: #3b82f6;
      --amber: #f59e0b;
      --green: #10b981;
      --red: #ef4444;
      --radius: 10px;
      --font: 'Segoe UI', system-ui, sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header h1 { font-size: 20px; font-weight: 600; letter-spacing: 0.02em; }
    header span { font-size: 13px; color: var(--text2); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }

    main { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }

    .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .tab-btn {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 18px;
      font-size: 13px;
      color: var(--text2);
      cursor: pointer;
      transition: all .15s;
      font-family: var(--font);
    }
    .tab-btn.active {
      background: var(--bg3);
      border-color: #4a5080;
      color: var(--text);
      font-weight: 500;
    }
    .tab-btn:hover:not(.active) { background: var(--bg3); color: var(--text); }

    .panel { display: none; }
    .panel.active { display: block; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }
    .metric {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
    }
    .metric-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .metric-value { font-size: 22px; font-weight: 600; color: var(--text); }
    .metric-value.neg { color: var(--red); }
    .metric-value.pos { color: var(--green); }

    .section-row { display: flex; align-items: center; gap: 10px; margin: 24px 0 10px; }
    .section-title { font-size: 13px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
    select {
      font-size: 12px; padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text);
      font-family: var(--font);
      cursor: pointer;
    }

    .chart-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 20px;
    }
    .chart-wrap { position: relative; width: 100%; }

    .legend { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 16px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
    .legend-dot { width: 12px; height: 12px; border-radius: 3px; }

    .store-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .store-btn {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 7px 16px;
      font-size: 12px; color: var(--text2); cursor: pointer;
      font-family: var(--font); transition: all .15s;
    }
    .store-btn.active { background: var(--bg3); border-color: #4a5080; color: var(--text); font-weight: 500; }

    footer { text-align: center; padding: 28px; font-size: 12px; color: var(--text2); border-top: 1px solid var(--border); margin-top: 20px; }
  </style>
</head>

<header>

function monthOf(label) {
  const parts = label.trim().split(' ');
  return monthMap[parts[parts.length - 1]] || '';
}

function parseNum(s) {
  if (!s || s === '' || s === 'null') return 0;
  return parseFloat(s.toString().replace(/\./g,'').replace(',','.')) || 0;
}

  let s;
  if (abs >= 1000000) s = '$' + (abs/1000000).toFixed(2) + 'M';
  else if (abs >= 1000) s = '$' + (abs/1000).toFixed(0) + 'K';
  else s = '$' + Math.round(abs);
  return v < 0 ? '-' + s : s;
}

let currentStore = 'showroom';
const chartInstances = {};

function getRows() {
  return (STORES[currentStore] || []).map(r => ({
    label: r[0],
    month: monthOf(r[0]),
    ventas: parseNum(r[1]),
    gastos: parseNum(r[2]),
    ganancias: parseNum(r[3])
  })).filter(d => monthOrder.includes(d.month));
}

function getMonths(rows) {
  return [...new Set(rows.map(d => d.month))].sort((a,b) => monthOrder.indexOf(a) - monthOrder.indexOf(b));
}

function byMonth(rows, field) {
  const months = getMonths(rows);
  const res = {};
  months.forEach(m => {
    res[m] = rows.filter(d => d.month === m).reduce((s,d) => s + d[field], 0);
  });
  return res;
}

function byWeek(rows, field) {
  const weeks = [];
  let wSum = 0, wCount = 0, wMonthIdx = 0, weekNum = 1;
  let prevMonth = '';
  rows.forEach((d, i) => {
    if (d.month !== prevMonth) { weekNum = 1; prevMonth = d.month; }
    wSum += d[field]; wCount++;
    const next = rows[i+1];
    const endOfMonth = !next || next.month !== d.month;
    const endOfWeek = wCount >= 6;
    if (endOfMonth || endOfWeek) {
      weeks.push({ label: 'S' + weekNum + ' ' + d.month.slice(0,3), value: wSum });
      wSum = 0; wCount = 0; weekNum++;
    }
  });
  return weeks;
}

// ─── METRICS ──────────────────────────────────────────────────────────────────
function setMetrics(id, field) {
  const rows = getRows();
  const monthly = byMonth(rows, field);
  const vals = Object.values(monthly);
  const total = vals.reduce((s,v) => s+v, 0);
  const avg = vals.length ? total / vals.length : 0;
  const mx = Math.max(...vals);
  const mn = Math.min(...vals);
  const mxName = Object.keys(monthly).find(k => monthly[k] === mx) || '';
  const mnName = Object.keys(monthly).find(k => monthly[k] === mn) || '';
  document.getElementById(id).innerHTML = `
    <div class="metric"><div class="metric-label">Total período</div><div class="metric-value ${total<0?'neg':'pos'}">${fmt(total)}</div></div>
    <div class="metric"><div class="metric-label">Promedio mensual</div><div class="metric-value ${avg<0?'neg':''}">${fmt(avg)}</div></div>
    <div class="metric"><div class="metric-label">Mejor mes</div><div class="metric-value pos">${fmt(mx)}<br><small style="font-size:11px;color:#8b90b8">${mxName}</small></div></div>
    <div class="metric"><div class="metric-label">Peor mes</div><div class="metric-value ${mn<0?'neg':''}">${fmt(mn)}<br><small style="font-size:11px;color:#8b90b8">${mnName}</small></div></div>
  `;
}

// ─── CHARTS ───────────────────────────────────────────────────────────────────
const COLORS = { ventas:'#3b82f6', gastos:'#f59e0b', ganancias:'#10b981' };

function makeChart(id, labels, values, color, type='bar') {
  if (chartInstances[id]) chartInstances[id].destroy();
  const ctx = document.getElementById(id);
  if (!ctx) return;
  chartInstances[id] = new Chart(ctx.getContext('2d'), {
    type,
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: type === 'bar' ? values.map(v => v < 0 ? '#ef444499' : color + '99') : color + '33',
        borderColor: values.map(v => v < 0 ? '#ef4444' : color),
        borderWidth: type === 'bar' ? 0 : 2,
        fill: type !== 'bar',
        tension: 0.3,
        pointRadius: type !== 'bar' ? 3 : 0,
        pointHoverRadius: 5
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => fmt(c.parsed.y) } }
      },
      scales: {
        x: { ticks: { color:'#8b90b8', font:{size:11}, maxRotation:45, autoSkip:true, maxTicksLimit:20 }, grid:{ color:'rgba(255,255,255,0.04)' } },
        y: { ticks: { color:'#8b90b8', font:{size:11}, callback: v => fmt(v) }, grid:{ color:'rgba(255,255,255,0.06)' } }
      }
    }
  });
}

function buildDailyChart(canvasId, field, color, filterMonth) {
  const rows = getRows().filter(d => filterMonth === 'all' || d.month === filterMonth);
  makeChart(canvasId, rows.map(d=>d.label), rows.map(d=>d[field]), color);
}

function buildWeeklyChart(canvasId, field, color) {
  const w = byWeek(getRows(), field);
  makeChart(canvasId, w.map(x=>x.label), w.map(x=>x.value), color);
}

function buildMonthlyChart(canvasId, field, color) {
  const rows = getRows();
  const months = getMonths(rows);
  const m = byMonth(rows, field);
  makeChart(canvasId, months, months.map(x=>m[x]||0), color);
}

function buildComparativo() {
  if (chartInstances['chart-comp']) chartInstances['chart-comp'].destroy();
  const rows = getRows();
  const months = getMonths(rows);
  const vM = byMonth(rows,'ventas'), gM = byMonth(rows,'gastos'), gaM = byMonth(rows,'ganancias');
  const ctx = document.getElementById('chart-comp');
  if (!ctx) return;
  chartInstances['chart-comp'] = new Chart(ctx.getContext('2d'), {
    type: 'bar',
    data: {
      labels: months,
      datasets: [
        { label:'Ventas',    data: months.map(m=>vM[m]||0),  backgroundColor:'#3b82f699', borderColor:'#3b82f6', borderWidth:0 },
        { label:'Gastos',    data: months.map(m=>gM[m]||0),  backgroundColor:'#f59e0b99', borderColor:'#f59e0b', borderWidth:0 },
        { label:'Ganancias', data: months.map(m=>gaM[m]||0), backgroundColor: months.map(m=>(gaM[m]||0)<0?'#ef444499':'#10b98199'), borderColor: months.map(m=>(gaM[m]||0)<0?'#ef4444':'#10b981'), borderWidth:0 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: {
          display: true,
          labels: { color: '#8b90b8', font: { size: 12 }, boxWidth: 14 }
        },
        tooltip: { callbacks: { label: c => c.dataset.label + ': ' + fmt(c.parsed.y) } }
      },
      scales: {
        x: { ticks: { color:'#8b90b8', font:{size:11} }, grid:{ color:'rgba(255,255,255,0.04)' } },
        y: { ticks: { color:'#8b90b8', font:{size:11}, callback: v => fmt(v) }, grid:{ color:'rgba(255,255,255,0.06)' } }
      }
    }
  });
}

function populateSelects() {
  const rows = getRows();
  const months = getMonths(rows);
  ['sel-ventas-mes','sel-gastos-mes','sel-ganancias-mes'].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = '<option value="all">Todos los meses</option>';
    months.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m; opt.textContent = m;
      sel.appendChild(opt);
    });
  });
}

function buildAll() {
  populateSelects();
  setMetrics('metrics-ventas','ventas');
  setMetrics('metrics-gastos','gastos');
  setMetrics('metrics-ganancias','ganancias');
  buildDailyChart('chart-ventas-dia','ventas',COLORS.ventas,'all');
  buildWeeklyChart('chart-ventas-sem','ventas',COLORS.ventas);
  buildMonthlyChart('chart-ventas-mes','ventas',COLORS.ventas);
  buildDailyChart('chart-gastos-dia','gastos',COLORS.gastos,'all');
  buildWeeklyChart('chart-gastos-sem','gastos',COLORS.gastos);
  buildMonthlyChart('chart-gastos-mes','gastos',COLORS.gastos);
  buildDailyChart('chart-ganancias-dia','ganancias',COLORS.ganancias,'all');
  buildWeeklyChart('chart-ganancias-sem','ganancias',COLORS.ganancias);
  buildMonthlyChart('chart-ganancias-mes','ganancias',COLORS.ganancias);
  buildComparativo();
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
document.getElementById('main-tabs').addEventListener('click', e => {
  const tab = e.target.dataset.tab;
  if (!tab) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
});

document.getElementById('store-tabs').addEventListener('click', e => {
  const store = e.target.dataset.store;
  if (!store) return;
  currentStore = store;
  document.querySelectorAll('.store-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  buildAll();
});

['ventas','gastos','ganancias'].forEach(field => {
  document.getElementById('sel-' + field + '-mes').addEventListener('change', e => {
    buildDailyChart('chart-' + field + '-dia', field, COLORS[field], e.target.value);
  });
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', buildAll);
</script>
